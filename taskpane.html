<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mail naar Order verplaatsen</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f2f1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
    }

    .header {
      background: #0078d4;
      color: white;
      padding: 16px 20px;
      border-radius: 8px 8px 0 0;
      margin: -20px -20px 20px -20px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header p {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 3px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #323130;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c8c6c4;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #0078d4;
      box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.15);
    }

    .hint {
      font-size: 11px;
      color: #605e5c;
      margin-top: 6px;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover { background: #106ebe; }
    .btn-primary:active { background: #005a9e; }
    .btn-primary:disabled { background: #c8c6c4; cursor: not-allowed; }

    .status {
      display: none;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      align-items: center;
      gap: 10px;
    }

    .status.success {
      display: flex;
      background: #dff6dd;
      color: #107c10;
      border: 1px solid #bad80a;
    }

    .status.error {
      display: flex;
      background: #fde7e9;
      color: #a80000;
      border: 1px solid #f1707b;
    }

    .status.info {
      display: flex;
      background: #eff6fc;
      color: #0078d4;
      border: 1px solid #c7e0f4;
    }

    .icon { font-size: 18px; }

    .recent-section { margin-top: 0; }
    .recent-section h3 {
      font-size: 12px;
      font-weight: 600;
      color: #605e5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .recent-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .recent-tag {
      background: #edebe9;
      border: 1px solid #d2d0ce;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      color: #323130;
    }

    .recent-tag:hover {
      background: #0078d4;
      color: white;
      border-color: #0078d4;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <h1>📦 Mail naar Order</h1>
    <p>Verplaats deze e-mail naar een ordermap</p>
  </div>

  <div class="card">
    <label for="orderInput">Ordernummer</label>
    <input
      type="text"
      id="orderInput"
      placeholder="bijv. 10234"
      autocomplete="off"
      autofocus
    />
    <p class="hint">De mail wordt verplaatst naar: <strong>Orders / [ordernummer]</strong></p>

    <br/>
    <button class="btn-primary" id="moveBtn" onclick="verplaatsMail()">
      ✉️ Verplaats naar order
    </button>
  </div>

  <div id="statusMsg" class="status"></div>

  <div class="card recent-section" id="recentCard" style="display:none">
    <h3>Recent gebruikt</h3>
    <div class="recent-list" id="recentList"></div>
  </div>

  <script>
    let recentOrders = JSON.parse(sessionStorage.getItem('recentOrders') || '[]');

    Office.onReady(() => {
      renderRecent();

      // Enter key triggers move
      document.getElementById('orderInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') verplaatsMail();
      });
    });

    function renderRecent() {
      if (recentOrders.length === 0) return;
      document.getElementById('recentCard').style.display = 'block';
      const list = document.getElementById('recentList');
      list.innerHTML = '';
      recentOrders.slice(0, 8).forEach(order => {
        const tag = document.createElement('span');
        tag.className = 'recent-tag';
        tag.textContent = order;
        tag.onclick = () => {
          document.getElementById('orderInput').value = order;
          verplaatsMail();
        };
        list.appendChild(tag);
      });
    }

    function toonStatus(type, tekst) {
      const el = document.getElementById('statusMsg');
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      el.className = 'status ' + type;
      el.innerHTML = `<span class="icon">${icons[type]}</span><span>${tekst}</span>`;
    }

    async function verplaatsMail() {
      const orderNummer = document.getElementById('orderInput').value.trim();
      const btn = document.getElementById('moveBtn');

      if (!orderNummer) {
        toonStatus('error', 'Voer eerst een ordernummer in.');
        document.getElementById('orderInput').focus();
        return;
      }

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Bezig met verplaatsen...';
      toonStatus('info', `Zoekt map voor order ${orderNummer}...`);

      try {
        const mailbox = Office.context.mailbox;
        const item = mailbox.item;

        // Target folder path: "Orders/[ordernummer]"
        const doelMapNaam = `Orders/${orderNummer}`;

        mailbox.moveItemToFolder(
          doelMapNaam,
          (result) => {
            if (result.status === Office.AsyncResultStatus.Succeeded) {
              toonStatus('success', `Mail verplaatst naar <strong>${doelMapNaam}</strong>`);

              // Save to recent
              recentOrders = [orderNummer, ...recentOrders.filter(o => o !== orderNummer)].slice(0, 8);
              sessionStorage.setItem('recentOrders', JSON.stringify(recentOrders));
              renderRecent();

              document.getElementById('orderInput').value = '';
            } else {
              // Fallback: try to move using EWS / REST approach
              verplaatsViaEWS(orderNummer, doelMapNaam);
            }
          }
        );
      } catch (e) {
        verplaatsViaEWS(orderNummer, `Orders/${orderNummer}`);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '✉️ Verplaats naar order';
      }
    }

    // Fallback via Graph API (requires token)
    async function verplaatsViaEWS(orderNummer, mapNaam) {
      try {
        const mailbox = Office.context.mailbox;

        // Get item ID
        const itemId = mailbox.item.itemId;

        // Request token for Graph API
        Office.context.auth.getAccessTokenAsync({ allowSignInPrompt: true }, async (tokenResult) => {
          if (tokenResult.status !== Office.AsyncResultStatus.Succeeded) {
            toonStatus('error', `Map "${mapNaam}" niet gevonden. Maak de map eerst aan in Outlook.`);
            return;
          }

          const token = tokenResult.value;

          try {
            // First find the target folder
            const foldersResp = await fetch(
              `https://graph.microsoft.com/v1.0/me/mailFolders?$filter=displayName eq 'Orders'&$top=1`,
              { headers: { Authorization: `Bearer ${token}` } }
            );
            const foldersData = await foldersResp.json();

            if (!foldersData.value || foldersData.value.length === 0) {
              toonStatus('error', `Hoofdmap "Orders" niet gevonden. Maak deze aan in Outlook.`);
              return;
            }

            const ordersFolderId = foldersData.value[0].id;

            // Find or create subfolder
            const subResp = await fetch(
              `https://graph.microsoft.com/v1.0/me/mailFolders/${ordersFolderId}/childFolders?$filter=displayName eq '${orderNummer}'`,
              { headers: { Authorization: `Bearer ${token}` } }
            );
            const subData = await subResp.json();

            let subFolderId;
            if (subData.value && subData.value.length > 0) {
              subFolderId = subData.value[0].id;
            } else {
              // Create the subfolder
              const createResp = await fetch(
                `https://graph.microsoft.com/v1.0/me/mailFolders/${ordersFolderId}/childFolders`,
                {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${token}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({ displayName: orderNummer })
                }
              );
              const created = await createResp.json();
              subFolderId = created.id;
            }

            // Move the email
            const moveResp = await fetch(
              `https://graph.microsoft.com/v1.0/me/messages/${itemId}/move`,
              {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${token}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ destinationId: subFolderId })
              }
            );

            if (moveResp.ok) {
              toonStatus('success', `✅ Mail verplaatst naar <strong>${mapNaam}</strong>${subData.value?.length === 0 ? ' (nieuwe map aangemaakt)' : ''}`);

              recentOrders = [orderNummer, ...recentOrders.filter(o => o !== orderNummer)].slice(0, 8);
              sessionStorage.setItem('recentOrders', JSON.stringify(recentOrders));
              renderRecent();
              document.getElementById('orderInput').value = '';
            } else {
              toonStatus('error', 'Verplaatsen mislukt. Controleer uw rechten.');
            }

          } catch (graphErr) {
            toonStatus('error', 'Fout bij Graph API: ' + graphErr.message);
          }
        });

      } catch (e) {
        toonStatus('error', 'Onverwachte fout: ' + e.message);
      }
    }
  </script>
</body>
</html>
